# Standalone Milvus stack for local migration testing / development.
#
# Bring it up with:
#   docker compose -f docker-compose.milvus.yml up -d
# Tear it down with:
#   docker compose -f docker-compose.milvus.yml down -v
#
# Exposes the Milvus gRPC endpoint on http://127.0.0.1:19530 (matches the
# MILVUS_URI used by the offline migration script and the pytest suite).

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  rustfs:
    # RustFS is an S3-compatible object store (MinIO-compatible API) used here
    # in place of MinIO for Milvus' chunk/segment storage.
    image: rustfs/rustfs:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./volumes/rustfs:/data
    command: rustfs server /data

  milvus:
    image: milvusdb/milvus:v2.6.14
    command: ["milvus", "run", "standalone"]
    depends_on:
      - etcd
      - rustfs
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: rustfs:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
