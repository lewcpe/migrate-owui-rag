# Standalone Qdrant stack for local migration testing / development.
#
# Bring it up with:
#   docker compose -f docker-compose.qdrant.yml up -d
# Tear it down with:
#   docker compose -f docker-compose.qdrant.yml down -v
#
# Exposes the Qdrant REST endpoint on http://127.0.0.1:6333 and gRPC on :6334
# (matches the QDRANT_URI used by the offline migration script and pytest).

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./volumes/qdrant:/qdrant/storage
